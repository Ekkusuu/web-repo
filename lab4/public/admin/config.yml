backend:
  name: github
  repo: Ekkusuu/web-repo
  branch: lab4

# local_backend: true  # uncomment when running npm run dev:cms locally

media_folder: lab4/public/uploads
public_folder: /uploads

collections:
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Site Info
        file: lab4/src/data/site.json
        format: json
        fields:
          - { name: title, label: Page Title, widget: string }
          - { name: siteName, label: Site Name, widget: string }
          - { name: siteIcon, label: Site Icon (emoji), widget: string }
          - { name: description, label: Meta Description, widget: text }
          - { name: copyright, label: Footer Copyright, widget: string }

      - name: hero
        label: Hero Section
        file: lab4/src/data/hero.json
        format: json
        fields:
          - { name: headline, label: Headline, widget: string }
          - { name: headlineAccent, label: Headline Accent (colored part), widget: string }
          - { name: subheadline, label: Subheadline, widget: text }
          - { name: ctaPrimaryText, label: Primary CTA Text, widget: string }
          - { name: ctaPrimaryHref, label: Primary CTA Link, widget: string }
          - { name: ctaSecondaryText, label: Secondary CTA Text, widget: string }
          - { name: ctaSecondaryHref, label: Secondary CTA Link, widget: string }
          - name: stats
            label: Stats
            widget: list
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }

      - name: contact
        label: Contact Section
        file: lab4/src/data/contact.json
        format: json
        fields:
          - { name: heading, label: Heading, widget: string }
          - { name: description, label: Description, widget: text }
          - { name: email, label: Email Address, widget: string }
          - { name: discordLabel, label: Discord Description, widget: string }
          - { name: discordUrl, label: Discord Invite URL, widget: string }
          - { name: githubLabel, label: GitHub Description, widget: string }
          - { name: githubUrl, label: GitHub Issues URL, widget: string }

  - name: page_sections
    label: Page Sections
    files:
      - name: features
        label: Features Section
        file: lab4/src/data/features.json
        format: json
        fields:
          - { name: heading, label: Section Heading, widget: string }
          - { name: description, label: Section Description, widget: text }
          - name: items
            label: Feature Cards
            widget: list
            fields:
              - { name: icon, label: Icon (emoji), widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }

      - name: testimonials
        label: Testimonials Section
        file: lab4/src/data/testimonials.json
        format: json
        fields:
          - { name: heading, label: Section Heading, widget: string }
          - { name: description, label: Section Description, widget: text }
          - name: reviews
            label: Reviews
            widget: list
            fields:
              - { name: text, label: Review Text, widget: text }
              - { name: author, label: Author Name, widget: string }
              - { name: role, label: Author Role, widget: string }
              - { name: initials, label: Initials (2 chars), widget: string }
              - { name: rating, label: Star Rating (1-5), widget: number, min: 1, max: 5 }
          - name: stats
            label: Community Stats
            widget: list
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }

      - name: team
        label: Team Section
        file: lab4/src/data/team.json
        format: json
        fields:
          - { name: heading, label: Section Heading, widget: string }
          - { name: description, label: Section Description, widget: text }
          - name: members
            label: Team Members
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: initials, label: Initials (2 chars), widget: string }
              - { name: bio, label: Bio, widget: text }

      - name: pricing
        label: Pricing Section
        file: lab4/src/data/pricing.json
        format: json
        fields:
          - { name: heading, label: Section Heading, widget: string }
          - { name: description, label: Section Description, widget: text }
          - name: plans
            label: Pricing Plans
            widget: list
            fields:
              - { name: name, label: Plan Name, widget: string }
              - { name: price, label: Price (e.g. Free or $9), widget: string }
              - { name: period, label: Period (e.g. /month), widget: string }
              - { name: badge, label: Badge Text (optional), widget: string, required: false }
              - { name: featured, label: Featured Plan, widget: boolean, default: false }
              - { name: ctaText, label: CTA Button Text, widget: string }
              - { name: ctaHref, label: CTA Button Link, widget: string }
              - name: features
                label: Features List
                widget: list
                fields:
                  - { name: text, label: Feature Text, widget: string }
                  - { name: included, label: Included, widget: boolean, default: true }

      - name: faq
        label: FAQ Section
        file: lab4/src/data/faq.json
        format: json
        fields:
          - { name: heading, label: Section Heading, widget: string }
          - { name: description, label: Section Description, widget: text }
          - name: items
            label: FAQ Items
            widget: list
            fields:
              - { name: question, label: Question, widget: string }
              - { name: answer, label: Answer, widget: text }
