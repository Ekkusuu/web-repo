# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  # (lab3 content is deployed via the checkout ref below)
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lab3 branch
        uses: actions/checkout@v4
        with:
          ref: lab3
          path: lab3-source

      - name: Checkout lab4 branch
        uses: actions/checkout@v4
        with:
          ref: lab4
          path: lab4-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build lab3 with Vite
        working-directory: lab3-source/lab3
        run: |
          npm install
          npm run build

      - name: Build lab4 with Astro
        working-directory: lab4-source/lab4
        run: |
          npm install
          npm run build

      - name: Prepare deployment folder
        run: |
          mkdir -p _site/lab2
          mkdir -p _site/lab3
          mkdir -p _site/lab4
          cp -r lab3-source/lab2/. _site/lab2/
          cp -r lab3-source/lab3/dist/. _site/lab3/
          cp -r lab4-source/lab4/dist/. _site/lab4/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
